name: Linear Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linear-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release metadata
        id: release_meta
        shell: bash
        run: |
          release_name="release-$(date -u +'%Y-%m-%d_%H-%S')"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

      - name: Sync release to Linear
        id: linear_release
        uses: linear/linear-release-action@v0
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: sync
          name: ${{ steps.release_meta.outputs.release_name }}
          version: ${{ steps.release_meta.outputs.release_name }}

      - name: Print Linear release URL
        if: ${{ steps.linear_release.outputs.release-url != '' }}
        shell: bash
        run: echo "Linear release created: ${{ steps.linear_release.outputs.release-url }}"
